name: Mutation Testing

# Stryker mutation testing — weekly signal on test suite sensitivity.
# NOT a PR gate: mutation testing is slow (~10-15 min) and its value is
# trend tracking, not per-commit blocking. Results are uploaded as an artifact.
#
# Mutation score below 60% is a signal that tests are not sensitive to the
# bugs they claim to cover. See STANDARDS.md Chapter 5 (Testing).
#
# Run manually: pnpm test:mutation

on:
  schedule:
    - cron: '0 4 * * 0'  # Weekly Sunday 04:00 UTC
  workflow_dispatch:

jobs:
  mutation:
    name: Stryker mutation score
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Run mutation tests
        run: pnpm test:mutation
        continue-on-error: true

      - name: Upload mutation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutation-report
          path: |
            mutation-report.html
            mutation-report.json
          retention-days: 30
