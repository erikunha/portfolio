name: Post-Deploy Smoke Test

# Fires when Vercel updates a GitHub Deployment status.
# Vercel registers GitHub Deployments on every push; state=success means
# the build and CDN promotion completed. We filter to Production only.
on:
  deployment_status:

jobs:
  smoke:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    permissions:
      deployments: read
    timeout-minutes: 5

    steps:
      - name: Health check — /api/healthz is reachable (200 ok or 503 degraded)
        # WHY accept 503: healthz returns 503 when the PSI cron is stale — that
        # indicates a monitoring concern, not a failed deploy. Only a connection
        # error or an unexpected status (4xx, 0) means the endpoint is not live.
        run: |
          http_code=$(curl --max-time 30 --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            https://erikunha.dev/api/healthz)
          echo "Health check status: $http_code"
          if [ "$http_code" != "200" ] && [ "$http_code" != "503" ]; then
            echo "ERROR: /api/healthz returned $http_code (expected 200 or 503)"
            exit 1
          fi

      - name: Homepage responds with 200
        run: |
          http_code=$(curl --fail --max-time 30 --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            https://erikunha.dev)
          echo "Homepage status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "ERROR: homepage returned $http_code"
            exit 1
          fi
