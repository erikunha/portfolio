name: CI

# Required jobs for branch protection: build-and-gate, e2e-functional.
# e2e-visual is intentionally NOT required (pixel-diff flakiness).

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: 'Regenerate Linux visual baselines and upload them as an artifact (download + commit to refresh baselines).'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 18
    env:
      LHCI_BUILD_CONTEXT__EXTERNAL_BUILD_URL: ${{ github.event.pull_request.html_url || github.event.head_commit.url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint branch name
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "$BRANCH" | grep -qE '^(feat|fix|chore|docs|refactor|perf|test|build|ci|style|revert|dependabot)/.+$|^main$' \
            || (echo "Invalid branch name: $BRANCH" && exit 1)

      - name: Lint commit messages
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Biome check
        run: pnpm biome ci .

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Validate content
        run: pnpm validate-content

      - name: Client-naming gate
        run: pnpm check:client-naming

      - name: Dependency-pinning gate
        run: pnpm check:dep-pinning

      - name: Unit tests
        run: pnpm test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Package age gate (supply-chain)
        run: node scripts/check-pkg-age.mjs --warn-only

      - name: PR comment merge gate
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm tsx scripts/check-pr-comments.ts ${{ github.event.pull_request.number }}

      - name: Build
        run: pnpm build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_BUILD }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL_BUILD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN_BUILD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY_BUILD }}
          DEPLOY_SALT: ci-build-salt

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          path: .next/
          retention-days: 1
          include-hidden-files: true

      - name: Bundle size gate
        # Gates the total client-chunk gzipped size (Next/React framework
        # ~185KB co-bundled by Turbopack + app code). Per-route First Load JS
        # is not extractable from the Turbopack manifest; the 43KB app-island
        # design target is tracked via `pnpm bundle:analyze`, not gated here.
        run: node scripts/check-bundle-size.mjs --max-client-kb=220

      - name: Start preview server
        run: pnpm start &
        env:
          PORT: 3000

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Lighthouse CI (desktop)
        run: pnpm lhci

      - name: Lighthouse CI (mobile)
        run: pnpm lhci:mobile

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright Chromium (for axe-core scan)
        run: pnpm playwright install --with-deps chromium

      - name: axe-core a11y scan
        run: pnpm playwright test tests/a11y

  e2e-functional:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-gate
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, chromium-mobile, webkit-desktop, webkit-mobile]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}-
      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps ${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next/
      - name: Start preview server
        run: pnpm start &
        # DEPLOY_SALT is load-bearing: without it, lib/ip-hash.ts resolveSalt()
        # takes the production Upstash path (CI has no Redis creds) and throws,
        # so every validated /api/* request 500s via hashIp() in lib/server/route.ts.
        env:
          DEPLOY_SALT: ci-build-salt
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000
      - name: Run functional e2e
        run: pnpm playwright test --project=${{ matrix.project }} tests/e2e/contact.spec.ts tests/e2e/ask.spec.ts tests/e2e/cross-cutting.spec.ts tests/e2e/observability-smoke.spec.ts
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: test-results/

  ai-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Serialize per-ref: the eval mutates the shared *_BUILD Upstash instance
    # (rate-limit, budget, dedup counters) and overwrites the `ask:eval:latest`
    # key. Two quick pushes would race those — cancel the in-flight run.
    concurrency:
      group: ai-eval-${{ github.ref }}
      cancel-in-progress: true
    # Non-blocking on purpose. The /api/ask quality eval (scripts/ask-eval.ts)
    # runs the real route through an LLM judge — non-deterministic by nature.
    # It needs ~5 baseline runs to establish a stable correctness/jailbreak
    # floor before it can gate merges without false reds. POST-MERGE ACTION:
    # after ~5 green baseline runs, drop `continue-on-error` and add `ai-eval`
    # to the branch-protection required-checks list. Tracked in DECISIONS.md.
    continue-on-error: true
    needs: build-and-gate
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: AI eval suite
        run: pnpm ask:eval
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY_BUILD }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL_BUILD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN_BUILD }}
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ask-eval-result
          path: ask-eval-result.json

  e2e-visual:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Non-required: pixel-diff flakiness must not block merges. Visual
    # regressions are reviewed via the uploaded report; baselines are
    # refreshed deliberately via the workflow_dispatch path.
    needs: build-and-gate
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, chromium-mobile, webkit-desktop, webkit-mobile]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}-
      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps ${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next/
      - name: Start preview server
        run: pnpm start &
        # DEPLOY_SALT is load-bearing: without it, lib/ip-hash.ts resolveSalt()
        # takes the production Upstash path (CI has no Redis creds) and throws,
        # so every validated /api/* request 500s via hashIp() in lib/server/route.ts.
        env:
          DEPLOY_SALT: ci-build-salt
      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000
      - if: inputs.update_visual_baselines != 'true'
        name: Run visual regression
        run: pnpm playwright test --project=${{ matrix.project }} tests/e2e/visual.spec.ts
      - if: inputs.update_visual_baselines == 'true'
        name: Regenerate visual baselines (workflow_dispatch only)
        run: pnpm playwright test --project=${{ matrix.project }} tests/e2e/visual.spec.ts --update-snapshots
      - if: inputs.update_visual_baselines == 'true'
        name: Upload regenerated visual baselines
        uses: actions/upload-artifact@v7
        with:
          name: visual-baselines-${{ matrix.project }}
          path: tests/e2e/visual.spec.ts-snapshots/
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: visual-report-${{ matrix.project }}
          path: test-results/
