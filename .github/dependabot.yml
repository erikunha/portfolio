version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dependencies:
        patterns:
          - '*'
    ignore:
      - dependency-name: zod
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
