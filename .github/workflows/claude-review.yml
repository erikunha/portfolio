# claude-review: on-demand Copilot-style PR review, posted by claude[bot] itself.
#
# Comment `/claude-review` on a PR and Claude posts a real GitHub review the way
# the @claude mention does: the "Claude Code is working…" acknowledgement, a pull
# request overview, AND inline line-anchored review threads on the code, ALL authored
# by claude[bot]. A fallback reviewer for when Copilot is off / errored / out of quota.
#
# This runs the action in TAG MODE (a custom trigger_phrase, no `prompt` input), so
# the action does the posting under its own GitHub App identity (claude[bot]). That is
# the only way to get the claude[bot] author + the native review UI; a workflow step
# can only post as github-actions[bot]. The review brief is injected via
# --append-system-prompt in claude_args (one flowing block, no backticks or inner
# double-quotes, so it survives claude_args shell-splitting).
#
# Distinct from claude.yml: that workflow answers general `@claude` mentions; this one
# is the `/claude-review` slash command. The triggers do not collide.
name: Claude Review

on:
  issue_comment:
    types: [created]

# cancel-in-progress: false: the action posts under its app token, which is not
# recursion-guarded like GITHUB_TOKEN; never let a self-triggered run cancel an
# in-flight review.
concurrency:
  group: claude-review-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write
  actions: read

jobs:
  review:
    # Authorization guard: only a trusted commenter on a PR using /claude-review can
    # spend the token (avoids even starting the runner for a drive-by commenter).
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/claude-review') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
      - uses: anthropics/claude-code-action@806af32823ef69c8ef357086c573a902af641307 # v1
        with:
          # Claude Max subscription token. Tag mode posts as claude[bot] using the
          # action's GitHub App token, minted from this.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Tag mode responds to /claude-review (not @claude); no `prompt` input keeps
          # it in tag mode (claude[bot] posting) rather than automation mode.
          trigger_phrase: /claude-review
          # allowedTools: the inline-comment tool (line-anchored Copilot-style threads)
          # plus read-only context. The review brief (the full repo-tuned prompt) is one
          # flowing paragraph with no backticks / inner double-quotes so claude_args
          # shell-splits it into exactly two args.
          claude_args: >-
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*)"
            --append-system-prompt "You are the final pre-merge reviewer of this pull request, in the style of a GitHub Copilot code review but tuned to THIS repository: post a short pull request OVERVIEW and ALSO leave INLINE review comments anchored to the specific changed lines. Do both, not just inline and not just a summary. This is a production reference codebase whose conventions are documented and often differ from generic React or Next.js advice, so before judging, read CLAUDE.md, STANDARDS.md, ARCHITECTURE.md, DECISIONS.md, and the files under .claude/rules with your Read and Grep tools, and follow the repo conventions over generic best practice unless a convention causes a correctness, security, accessibility, or performance defect; do not recite budget numbers from memory. Review only the changes in this PR, which you get from gh pr diff, using the rest of the codebase as context, against the PR head, and never re-flag an issue already fixed in a later commit. Weight your attention on the defect classes that actually recur in this repo, which a generic reviewer misses: first and most frequent, documentation or code-comment or ADR or PR-description text that contradicts what the code now does; second, CI and shell-script and git-hook robustness under .github workflows and husky and scripts, for example curl retry or timeout budgets that can exceed the job timeout, a silent curl without show-error, a gate that fails open where it must fail closed, non-portable grep, and cwd-relative paths that break when run from a subdirectory; third, edge and server boot guards, for example a NEXT_RUNTIME check that skips when the variable is undefined, a missing server-only import, a NaN or bad timestamp treated as a healthy state, or an uncleared setTimeout that keeps a serverless invocation alive; fourth, weak test assertions that check less than the invariant they claim and environment-stub leakage across Vitest files; fifth, validation edges such as prefix-glob host allowlists or reading a request stream twice. Also review the standard dimensions at a lower base rate: correctness and logic bugs, architecture and module and component boundaries, RSC-first with client islands by exception where the Matrix dialog loop must mutate via useRef textContent rather than per-keystroke useState, performance against the CI-enforced LCP and INP and CLS and bundle budgets in CLAUDE.md, accessibility to WCAG 2.1 AA including the two-token palette where the signal accent color must never style body text, the defineHandler API boundary with its rate-limit then parse then validate then handle order, and user-facing copy kept in content typescript modules rather than inlined in JSX. Do NOT comment on formatting, lint, import order, naming, contrast ratios, bundle size, Lighthouse scores, or dependency pinning, because CI gates already enforce all of those; also skip acronym or capitalization nits, micro-performance on cold one-shot script paths, and typo-only nits in non-shipped files. Do not invent feedback: if a file is clean say nothing about it, and if the whole PR is clean approve it plainly. Give every inline comment a severity of critical, important, or minor with a concise suggested fix, anchored to a line this PR changed. End the overview with exactly one verdict: Approve, Approve with minor changes, Request changes, or Reject. The repo is a production Next.js 16 App Router app, RSC-first, React 19, TypeScript strict, Tailwind v4, deployed on Vercel Edge."
