name: Mutation Testing

on:
  schedule:
    - cron: '0 4 * * 0'  # Weekly Sunday 04:00 UTC
  workflow_dispatch:

jobs:
  mutation:
    name: Stryker mutation score
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Stryker incremental file
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .stryker-incremental.json
          key: stryker-incremental-${{ github.run_id }}
          restore-keys: |
            stryker-incremental-

      - name: Run mutation tests
        run: pnpm test:mutation
        continue-on-error: true

      - name: Guard — fail loudly if the runner did not actually run
        run: |
          if [ ! -f mutation-report.json ]; then
            echo "::error::Stryker produced no mutation-report.json — the runner crashed (see the 'Run mutation tests' log). This is NOT a low score."
            exit 1
          fi
          node -e "
            const r = require('./mutation-report.json');
            const m = Object.values(r.files || {}).flatMap(f => f.mutants || []);
            const scoreable = m.filter(x => ['Killed', 'Timeout', 'Survived', 'NoCoverage'].includes(x.status)).length;
            if (scoreable === 0) {
              // ::error:: workflow commands must go to STDOUT — GitHub Actions
              // does not parse them from stderr, so console.log (not console.error).
              console.log('::error::mutation-report.json has zero scoreable mutants — the runner did not execute any tests (infrastructure failure, not a low score).');
              process.exit(1);
            }
            console.log('Runner healthy: ' + scoreable + ' scoreable mutant(s) produced.');
          "

      - name: Upload mutation report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutation-report
          path: |
            mutation-report.html
            mutation-report.json
          retention-days: 30

      - name: Post mutation score to job summary
        if: always()
        run: |
          if [ -f mutation-report.json ]; then
            node -e "
              const fs = require('fs');
              const r = JSON.parse(fs.readFileSync('mutation-report.json', 'utf8'));
              // Stryker JSON uses mutation-testing-report-schema (no top-level mutationScore field).
              // Score = (killed+timeout) / (killed+timeout+survived+noCoverage).
              const mutants = Object.values(r.files || {}).flatMap(f => f.mutants || []);
              const killedOrTimeout = mutants.filter(m => m.status === 'Killed' || m.status === 'Timeout').length;
              const survived = mutants.filter(m => m.status === 'Survived').length;
              const noCoverage = mutants.filter(m => m.status === 'NoCoverage').length;
              // RuntimeError/CompileError excluded from score per Stryker convention:
              // these indicate infrastructure issues, not test-suite effectiveness.
              const runtimeError = mutants.filter(m => m.status === 'RuntimeError').length;
              const compileError = mutants.filter(m => m.status === 'CompileError').length;
              const total = killedOrTimeout + survived + noCoverage;
              const score = total > 0 ? (killedOrTimeout / total * 100).toFixed(1) : 'N/A';
              const high = (r.thresholds ?? {}).high ?? 80;
              const low = (r.thresholds ?? {}).low ?? 65;
              const infraNote = (runtimeError + compileError) > 0
                ? '\n\n> ' + (runtimeError + compileError) + ' mutant(s) excluded from score (RuntimeError: ' + runtimeError + ', CompileError: ' + compileError + ') — infrastructure issues, not test-effectiveness signal.'
                : '';
              const lines = [
                '## Stryker Mutation Score',
                '',
                '**Score:** ' + (score === 'N/A' ? score : score + '%'),
                '',
                '**Thresholds:** high: ' + high + '%, low: ' + low + '%',
                '',
                'Download the \`mutation-report\` artifact for the full HTML report.' + infraNote,
              ].join('\n');
              fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines + '\n');
            " || echo "## Stryker Mutation Score: could not parse report" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Stryker Mutation Score: report not generated" >> "$GITHUB_STEP_SUMMARY"
          fi
