name: Post-Deploy Smoke Test

# Fires when Vercel updates a GitHub Deployment status.
# Vercel registers GitHub Deployments on every push; state=success means
# the build and CDN promotion completed. We filter to Production only.
on:
  deployment_status:

# Canonical production host. The custom domain serves a 308 redirect on the
# APEX (erikunha.dev -> www.erikunha.dev); the apex 308 carries ONLY the
# redirect-layer HSTS header, NOT the application security headers. Header and
# routing assertions MUST therefore run against the canonical www 200 (or follow
# the redirect with -L), never the apex 308 - curling the apex directly is the
# exact false-positive that the dissolved WS0 audit produced. See WS5 spec.
env:
  CANONICAL_HOST: https://www.erikunha.dev

jobs:
  smoke:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    permissions:
      deployments: read
    timeout-minutes: 5

    steps:
      - name: Health check - deployment artifact /api/healthz (200 ok or 503 degraded)
        # WHY target_url: probes the specific deployment artifact, not the CDN
        # edge which may still serve the previous version during propagation.
        # WHY env: keeps target_url as a shell variable - ${{ }} inline would
        # substitute the raw value into the script body (injection risk).
        # WHY accept 503: healthz returns 503 when the PSI cron is stale -
        # a monitoring concern, not a deploy failure.
        env:
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          DEPLOY_URL="${DEPLOY_URL%/}"
          case "$DEPLOY_URL" in
            https://*.vercel.app|https://erikunha.dev|https://www.erikunha.dev) ;;
            *) echo "ERROR: unexpected target_url: $DEPLOY_URL"; exit 1;;
          esac
          http_code=$(curl --max-time 30 --retry 2 --retry-connrefused --silent \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${DEPLOY_URL}/api/healthz")
          echo "Artifact health check status: $http_code (deployment: $DEPLOY_URL)"
          if [ "$http_code" != "200" ] && [ "$http_code" != "503" ]; then
            echo "ERROR: artifact /api/healthz returned $http_code (expected 200 or 503)"
            exit 1
          fi

      - name: Health check - canonical /api/healthz never 308 (200 ok or 503 degraded)
        # WHY canonical, no-follow: the artifact *.vercel.app URL can bypass the
        # custom-domain routing layer that injected the historical 308 on
        # /api/healthz. This step exercises the FULL canonical routing path and
        # uses HEAD (-I) WITHOUT -L so a 308 surfaces as a hard failure instead
        # of being silently followed to a 404. This is the class of regression
        # the WS5 audit found: the unit test passed; the live route 308'd.
        # WHY --retry on connection error only: tolerates serverless cold-start
        # connection blips, NOT bad HTTP codes - a 308 still fails immediately.
        run: |
          http_code=$(curl --max-time 30 --retry 2 --retry-connrefused --silent \
            --head \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${CANONICAL_HOST}/api/healthz")
          echo "Canonical health check status: $http_code ($CANONICAL_HOST/api/healthz)"
          if [ "$http_code" = "308" ] || [ "$http_code" = "301" ] || [ "$http_code" = "302" ]; then
            echo "ERROR: /api/healthz redirected ($http_code) - trailing-slash/canonical regression"
            exit 1
          fi
          if [ "$http_code" != "200" ] && [ "$http_code" != "503" ]; then
            echo "ERROR: canonical /api/healthz returned $http_code (expected 200 or 503)"
            exit 1
          fi

      - name: Security headers present on canonical 200 (salvaged WS0 header smoke)
        # WHY -L on the canonical host: the apex 308 carries only redirect-layer
        # HSTS, so asserting headers on the apex 308 is a FALSE POSITIVE (the
        # exact error that produced the dissolved WS0 CRITICAL). Following the
        # redirect (-L) to the www 200 reads the real application headers set by
        # next.config.ts (static headers) + proxy.ts (CSP + Reporting-Endpoints).
        # WHY bounded retry: a fresh deploy can lag at the CDN edge for a few
        # seconds; retry the whole HEAD fetch up to 5 times with a 3s backoff
        # before failing, so a propagation race does not flake the smoke.
        # The 7 asserted headers are the project's security contract:
        #   Content-Security-Policy, X-Frame-Options, X-Content-Type-Options,
        #   Referrer-Policy, Permissions-Policy, Reporting-Endpoints,
        #   Strict-Transport-Security.
        run: |
          REQUIRED_HEADERS="content-security-policy x-frame-options x-content-type-options referrer-policy permissions-policy reporting-endpoints strict-transport-security"
          attempt=0
          max_attempts=5
          headers=""
          while [ "$attempt" -lt "$max_attempts" ]; do
            attempt=$((attempt + 1))
            # -L follows the apex->www redirect to the canonical 200.
            # -D - dumps response headers; on a redirect chain curl prints headers
            # for EACH hop, so we keep only the final 200 block by taking the last
            # occurrence of each header (tac | first-match) below.
            headers=$(curl --max-time 30 --silent --location \
              --head \
              --write-out "HTTP_FINAL:%{http_code}\n" \
              "${CANONICAL_HOST}/" || true)
            final_code=$(printf '%s\n' "$headers" | grep '^HTTP_FINAL:' | tail -n1 | cut -d: -f2)
            if [ "$final_code" = "200" ]; then
              break
            fi
            echo "Attempt $attempt: canonical homepage not yet 200 (got '${final_code:-none}'), retrying in 3s..."
            sleep 3
          done
          if [ "$final_code" != "200" ]; then
            echo "ERROR: canonical homepage did not reach 200 after $max_attempts attempts (last: '${final_code:-none}')"
            exit 1
          fi
          # Lower-case the header dump once; curl emits header names case-insensitively.
          lc_headers=$(printf '%s\n' "$headers" | tr '[:upper:]' '[:lower:]')
          missing=""
          for h in $REQUIRED_HEADERS; do
            if ! printf '%s\n' "$lc_headers" | grep -q "^${h}:"; then
              missing="$missing $h"
            fi
          done
          if [ -n "$missing" ]; then
            echo "ERROR: missing security header(s) on canonical 200:$missing"
            echo "--- response headers (lower-cased) ---"
            printf '%s\n' "$lc_headers"
            exit 1
          fi
          echo "All 7 security headers present on $CANONICAL_HOST 200."

      - name: Homepage responds with 200
        # WHY canonical URL with -L: verifies the production domain and CDN edge
        # correctly promote the new deployment, following the apex->www redirect
        # to the canonical 200 - separate from the artifact check above.
        run: |
          http_code=$(curl --max-time 30 --retry 2 --retry-connrefused --silent \
            --location \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${CANONICAL_HOST}/")
          echo "Homepage status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "ERROR: homepage returned $http_code"
            exit 1
          fi
