name: Post-Deploy Smoke Test

# Fires when Vercel updates a GitHub Deployment status.
# Vercel registers GitHub Deployments on every push; state=success means
# the build and CDN promotion completed. We filter to Production only.
on:
  deployment_status:

# Canonical production host. The custom domain serves a 308 redirect on the
# APEX (erikunha.dev -> www.erikunha.dev); the apex 308 carries ONLY the
# redirect-layer HSTS header, NOT the application security headers. Header and
# healthz assertions MUST therefore run against the canonical www 200 DIRECTLY
# (no -L), never the apex 308 and never a followed redirect - asserting headers
# across -L would FALSE-POSITIVE on the 308's weak HSTS, the exact error that
# produced the dissolved WS0 CRITICAL. (The one homepage step that DOES use -L
# deliberately curls the APEX to verify the redirect path; see its comment.)
# See WS5 spec.
env:
  CANONICAL_HOST: https://www.erikunha.dev

jobs:
  smoke:
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    permissions:
      deployments: read
    timeout-minutes: 5

    steps:
      - name: Health check - deployment artifact /api/healthz (200 ok or 503 degraded)
        # WHY target_url: probes the specific deployment artifact, not the CDN
        # edge which may still serve the previous version during propagation.
        # WHY env: keeps target_url + secret as shell variables - ${{ }} inline
        # would substitute the raw value into the script body (injection risk).
        # WHY accept 503: healthz returns 503 when the PSI cron is stale -
        # a monitoring concern, not a deploy failure.
        # WHY the bypass header: ONLY the *.vercel.app deployment artifact is
        # behind Vercel Deployment Protection (responds 401 with a
        # _vercel_sso_nonce cookie), so probing it requires the "Protection
        # Bypass for Automation" secret sent as x-vercel-protection-bypass.
        # Canonical hosts (erikunha.dev / www) are public and are probed
        # DIRECTLY - no bypass header, no skip. For the protected artifact:
        # without the secret it is unreachable to CI, so the probe is SKIPPED
        # (loudly) rather than failing the deploy - the canonical-host healthz
        # step below still gates real production health; with the secret set, a
        # 401 becomes a genuine failure (bad/rotated secret).
        # NEVER add `set -x` to this step: it would trace-print the curl line
        # with the expanded $BYPASS secret into the public CI log.
        env:
          DEPLOY_URL: ${{ github.event.deployment_status.target_url }}
          BYPASS: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
        run: |
          DEPLOY_URL="${DEPLOY_URL%/}"
          # Anchor matching to a bare https host. The case globs below use `*`,
          # which spans `/` - so without this a forged target_url like
          # `https://evil.com/x.vercel.app` would match `https://*.vercel.app`
          # and leak the bypass secret to evil.com. Reject anything where the
          # post-scheme remainder is not a plain hostname (no path, userinfo,
          # port, query, or scheme mismatch).
          host_only="${DEPLOY_URL#https://}"
          case "$host_only" in
            "$DEPLOY_URL"|*[!a-zA-Z0-9.-]*)
              echo "ERROR: target_url is not a bare https host: $DEPLOY_URL"; exit 1;;
          esac
          header_args=()
          case "$DEPLOY_URL" in
            https://*.vercel.app)
              # Protected artifact: the bypass secret is required.
              if [ -z "$BYPASS" ]; then
                echo "WARNING: VERCEL_AUTOMATION_BYPASS_SECRET is unset - the *.vercel.app artifact is gated by Vercel Deployment Protection (401)."
                echo "Skipping the artifact probe; the canonical /api/healthz step below still gates production health."
                echo "Provision the secret (Vercel > Settings > Deployment Protection > Protection Bypass for Automation) to re-enable direct artifact probing."
                exit 0
              fi
              header_args=(--header "x-vercel-protection-bypass: $BYPASS")
              ;;
            https://erikunha.dev|https://www.erikunha.dev)
              # Public canonical host: probe directly, no bypass needed.
              ;;
            *) echo "ERROR: unexpected target_url: $DEPLOY_URL"; exit 1;;
          esac
          http_code=$(curl --max-time 30 --retry 2 --retry-connrefused --silent \
            "${header_args[@]}" \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${DEPLOY_URL}/api/healthz")
          echo "Artifact health check status: $http_code (deployment: $DEPLOY_URL)"
          if [ "$http_code" != "200" ] && [ "$http_code" != "503" ]; then
            echo "ERROR: artifact /api/healthz returned $http_code (expected 200 or 503)"
            exit 1
          fi

      - name: Health check - canonical /api/healthz never 308 (200 ok or 503 degraded)
        # WHY canonical, no-follow: the artifact *.vercel.app URL can bypass the
        # custom-domain routing layer that injected the historical 308 on
        # /api/healthz. This step exercises the FULL canonical routing path and
        # uses HEAD (-I) WITHOUT -L so a 308 surfaces as a hard failure instead
        # of being silently followed to a 404. This is the class of regression
        # the WS5 audit found: the unit test passed; the live route 308'd.
        # WHY --retry on connection error only: tolerates serverless cold-start
        # connection blips, NOT bad HTTP codes - a 308 still fails immediately.
        # WHY 503 exits 0: a 503 healthz is a monitoring degradation (Redis down),
        # not a deploy failure. The site is live; only the Redis dependency is
        # degraded. We send an alert email instead of failing the smoke run.
        # NEVER add set -x to this step: it handles RESEND_API_KEY and tracing
        # would print the secret to the public CI log.
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          http_code=$(curl --max-time 30 --retry 2 --retry-connrefused --silent \
            --head \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${CANONICAL_HOST}/api/healthz")
          echo "Canonical health check status: $http_code ($CANONICAL_HOST/api/healthz)"
          if [ "$http_code" = "308" ] || [ "$http_code" = "301" ] || [ "$http_code" = "302" ]; then
            echo "ERROR: /api/healthz redirected ($http_code) - trailing-slash/canonical regression"
            exit 1
          fi
          if [ "$http_code" != "200" ] && [ "$http_code" != "503" ]; then
            echo "ERROR: canonical /api/healthz returned $http_code (expected 200 or 503)"
            exit 1
          fi
          if [ "$http_code" = "503" ]; then
            echo "WARNING: healthz returned 503 (degraded) — Redis or PSI data may be unavailable. Sending alert."
            if [ -n "$RESEND_API_KEY" ]; then
              resend_resp=$(curl --max-time 15 --silent --fail-with-body \
                --request POST \
                --url "https://api.resend.com/emails" \
                --header "Authorization: Bearer $RESEND_API_KEY" \
                --header "Content-Type: application/json" \
                --data "{\"from\":\"monitor@erikunha.dev\",\"to\":[\"erikhenriquealvescunha@gmail.com\"],\"subject\":\"[erikunha.dev] healthz 503 — degraded state post-deploy\",\"text\":\"Post-deploy smoke detected healthz 503 at ${CANONICAL_HOST}/api/healthz. Possible causes: (1) Upstash Redis unavailable — rate-limiting fails open, budget enforcement fails open; (2) PSI data stale — PageSpeed cache miss. Check Upstash dashboard and /api/healthz response body for the specific degraded field. This is not a deploy failure - the site is serving. It is a monitoring degradation.\"}" \
                --write-out '\nHTTP %{http_code}') \
                || echo "WARNING: could not send alert email (Resend error: ${resend_resp})"
            else
              echo "WARNING: RESEND_API_KEY not set — cannot send alert email. Check repo secrets."
            fi
          fi

      - name: Security headers present on canonical 200 (salvaged WS0 header smoke)
        # WHY canonical host with NO -L: the apex 308 carries only redirect-layer
        # HSTS, so asserting headers across a followed redirect would FALSE-POSITIVE
        # on the 308's weak header (the exact error that produced the dissolved WS0
        # CRITICAL). Fetching the canonical www 200 DIRECTLY (no -L) reads exactly
        # the application headers set by next.config.ts (static) + proxy.ts (CSP +
        # Reporting-Endpoints) — never a redirect hop's. A 3xx fails (final != 200).
        # WHY bounded retry: a fresh deploy can lag at the CDN edge for a few
        # seconds; retry the whole HEAD fetch up to 5 times with a 3s backoff
        # before failing, so a propagation race does not flake the smoke.
        # The 7 asserted headers are the project's security contract:
        #   Content-Security-Policy, X-Frame-Options, X-Content-Type-Options,
        #   Referrer-Policy, Permissions-Policy, Reporting-Endpoints,
        #   Strict-Transport-Security.
        run: |
          REQUIRED_HEADERS="content-security-policy x-frame-options x-content-type-options referrer-policy permissions-policy reporting-endpoints strict-transport-security"
          attempt=0
          max_attempts=5
          headers=""
          while [ "$attempt" -lt "$max_attempts" ]; do
            attempt=$((attempt + 1))
            # Fetch the CANONICAL host DIRECTLY with NO -L. www returns 200 with
            # no redirect, so the dumped headers are exactly the final 200's own —
            # never a redirect hop's. This is the WS0 lesson applied correctly:
            # following -L would combine the apex 308 (redirect-layer HSTS only)
            # with the 200, and a header-presence grep would pass on the 308's
            # weak HSTS, masking a real header regression. If the canonical host
            # ever returns a 3xx, final_code != 200 fails loudly below (correct).
            headers=$(curl --max-time 30 --silent \
              --head \
              --write-out "HTTP_FINAL:%{http_code}\n" \
              "${CANONICAL_HOST}/" || true)
            final_code=$(printf '%s\n' "$headers" | grep '^HTTP_FINAL:' | tail -n1 | cut -d: -f2)
            if [ "$final_code" = "200" ]; then
              break
            fi
            echo "Attempt $attempt: canonical homepage not yet 200 (got '${final_code:-none}'), retrying in 3s..."
            sleep 3
          done
          if [ "$final_code" != "200" ]; then
            echo "ERROR: canonical homepage did not reach 200 after $max_attempts attempts (last: '${final_code:-none}')"
            exit 1
          fi
          # Lower-case the header dump once; curl emits header names case-insensitively.
          lc_headers=$(printf '%s\n' "$headers" | tr '[:upper:]' '[:lower:]')
          missing=""
          for h in $REQUIRED_HEADERS; do
            if ! printf '%s\n' "$lc_headers" | grep -q "^${h}:"; then
              missing="$missing $h"
            fi
          done
          if [ -n "$missing" ]; then
            echo "ERROR: missing security header(s) on canonical 200:$missing"
            echo "--- response headers (lower-cased) ---"
            printf '%s\n' "$lc_headers"
            exit 1
          fi
          echo "All 7 security headers present on $CANONICAL_HOST 200."

      - name: Homepage promotes via apex->www to 200
        # WHY the APEX with -L: this is the one step that intentionally exercises
        # the redirect PATH — curling the apex (erikunha.dev) and following -L
        # through the 308 to the canonical www 200 verifies the production domain
        # + CDN promote the new deployment end to end. (The header/healthz smokes
        # above deliberately do NOT follow redirects; this one deliberately does,
        # against the apex, so -L is meaningful here and a no-op nowhere.)
        run: |
          apex="${CANONICAL_HOST/www./}"
          http_code=$(curl --max-time 30 --retry 2 --retry-connrefused --silent \
            --location \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${apex}/")
          echo "Homepage (apex->www) status: $http_code"
          if [ "$http_code" != "200" ]; then
            echo "ERROR: homepage returned $http_code (apex->www promotion failed)"
            exit 1
          fi

      - name: API smoke - /api/ask (route alive, returns non-5xx)
        # WHY POST with empty body: a GET/HEAD on a POST-only route returns 405, not
        # useful for liveness. An empty POST hits the validation layer and returns 400
        # (invalid request schema) — confirms the route is alive, validating, and not
        # erroring at 500. The probe NEVER sends a real question to the AI Gateway
        # (validation rejects before reaching the AI call).
        # WHY no auth bypass header: /api/ask is served on the canonical public domain,
        # not the protected *.vercel.app artifact — no bypass needed.
        # KNOWN FAILURE MODE: when ASK_ENABLED=off, the route returns 503, which IS
        # >= 500 and WILL exit 1. A kill-switch deployment must either re-enable ASK
        # or remove this probe step before deploying. This is intentional — a disabled
        # route is a smoke failure for operator awareness.
        run: |
          http_code=$(curl --max-time 30 --retry 2 --retry-connrefused --silent \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{}' \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${CANONICAL_HOST}/api/ask")
          echo "API smoke /api/ask status: $http_code"
          # WHY 400/429 exactly: POST {} hits Zod validation (400) or rate-limit (429).
          # 404 = route missing (routing regression); 200 = schema accepted empty body (wrong);
          # 503 = kill-switch intentionally deployed (intentional exit 1 — expected behavior).
          if [ "$http_code" != "400" ] && [ "$http_code" != "429" ]; then
            echo "ERROR: /api/ask returned $http_code (expected 400 validation rejection or 429 rate-limit)"
            exit 1
          fi
          echo "OK: /api/ask responded with $http_code (route alive, validation or rate-limit active)"

      - name: API smoke - /api/contact (route alive, returns non-5xx)
        # WHY POST with empty body: /api/contact uses defineHandler + Zod schema.
        # An empty POST returns 400 (validation failure on required fields: name, email,
        # message). This confirms the route is alive and not erroring at 500.
        # A real contact form submission is NOT sent — validation rejects before Resend.
        # RESEND_API_KEY is not needed for this probe — it is not accessed.
        run: |
          http_code=$(curl --max-time 30 --retry 2 --retry-connrefused --silent \
            --request POST \
            --header "Content-Type: application/json" \
            --data '{}' \
            --output /dev/null \
            --write-out "%{http_code}" \
            "${CANONICAL_HOST}/api/contact")
          echo "API smoke /api/contact status: $http_code"
          # WHY 400/429 exactly: POST {} hits Zod validation (400) on required fields
          # name/email/message, or rate-limit (429). 404 = route missing (routing regression);
          # 200 = schema accepted empty body (wrong); 503 = kill-switch.
          if [ "$http_code" != "400" ] && [ "$http_code" != "429" ]; then
            echo "ERROR: /api/contact returned $http_code (expected 400 validation rejection or 429 rate-limit)"
            exit 1
          fi
          echo "OK: /api/contact responded with $http_code (route alive, validation or rate-limit active)"

      - name: Record deployed SHA in job summary
        if: always()
        # WHY if: always(): records the SHA even when other smoke steps fail —
        # useful for post-incident correlation ("what was live when the smoke failed?").
        # WHY node not jq: node is always available on ubuntu-latest; avoids a
        # dependency check. Graceful fallback: sha=unavailable if curl fails entirely.
        # WHY JOB_STATUS env: heading reflects actual outcome — "Verified" only when
        # all prior steps passed; failure/degradation gets an honest label instead.
        env:
          JOB_STATUS: ${{ job.status }}
        run: |
          sha=$(curl --max-time 15 --silent \
            "${CANONICAL_HOST}/api/healthz" \
            | node -e "
              let d='';
              process.stdin.on('data',c=>d+=c);
              process.stdin.on('end',()=>{
                try { process.stdout.write(JSON.parse(d).sha ?? 'unknown'); }
                catch { process.stdout.write('parse-error'); }
              });
            " 2>/dev/null || echo "unavailable")
          if [ "$JOB_STATUS" = "success" ]; then
            heading="## Production Deploy Verified"
          else
            heading="## Production Deploy SHA (smoke had failures or degradation)"
          fi
          {
            echo "$heading"
            echo ""
            echo "**SHA:** \`${sha}\`"
            echo "**Host:** ${CANONICAL_HOST}"
            echo "**Triggered by:** deployment_status event"
          } >> "$GITHUB_STEP_SUMMARY"
