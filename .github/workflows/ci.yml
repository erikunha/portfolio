name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: 'Regenerate Linux visual baselines and upload them as an artifact (download + commit to refresh baselines).'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-fast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 8
    concurrency:
      group: quality-fast-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint branch name
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "$BRANCH" | grep -qE '^(feat|fix|chore|docs|refactor|perf|test|build|ci|style|revert|dependabot|design-system)/.+$|^main$' \
            || (echo "Invalid branch name: $BRANCH" && exit 1)

      - name: Lint commit messages
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Biome check
        run: pnpm biome ci .

      - name: Validate content
        run: pnpm validate-content

      - name: Client-naming gate
        run: pnpm check:client-naming

      - name: Dependency-pinning gate
        run: pnpm check:dep-pinning

      - name: Harness size gate
        run: node scripts/check-harness-size.mjs

      - name: Component docs coverage
        run: pnpm check:component-docs

      - name: Doc-drift gate (ARCHITECTURE.md tree vs disk)
        run: pnpm check:doc-drift

      - name: Gate-health meta-gate (hook/script references resolve)
        run: pnpm check:gate-health

      - name: Detect-changes pathspec gate (no orphaned filters)
        run: pnpm check:detect-changes-paths

      - name: Contrast check
        run: pnpm lint:contrast

      - name: CSS tokens (no raw hex outside theme.css)
        run: pnpm lint:css-tokens

      - name: Package age check (supply-chain, info-only)
        run: node scripts/check-pkg-age.mjs --warn-only

      - name: Hook guard tests (bash-guard block/allow/bypass/DoS)
        run: pnpm test:hooks

      - name: PR comment merge gate
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm tsx scripts/check-pr-comments.ts ${{ github.event.pull_request.number }}

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    concurrency:
      group: typecheck-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache TypeScript build info
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-

      - name: Type check
        run: pnpm typecheck

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 8
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check if pnpm-lock.yaml changed
        id: lockfile-diff
        if: github.event_name == 'pull_request'
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=true
          if git diff --quiet "$BASE...$HEAD" -- pnpm-lock.yaml 2>/dev/null; then
            changed=false
          fi
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"

      - name: Dependency vulnerability audit
        if: github.event_name != 'pull_request' || steps.lockfile-diff.outputs.changed == 'true'
        run: pnpm audit --audit-level=moderate

      - name: Unit tests
        run: pnpm test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Post coverage comment
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('coverage/coverage-summary.json')) {
              core.warning('coverage/coverage-summary.json not found — skipping coverage comment. Did pnpm test:coverage complete?');
              return;
            }
            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            } catch (err) {
              core.warning(`Failed to parse coverage-summary.json: ${err.message}`);
              return;
            }
            const t = summary.total;
            if (!t || typeof t.lines?.pct !== 'number') {
              core.warning('coverage-summary.json is missing expected "total" fields. Skipping coverage comment.');
              return;
            }
            const pct = (n) => `${n.pct.toFixed(1)}%`;
            const marker = '<!-- coverage-bot -->';
            const body = [
              marker,
              '## Coverage',
              '| Metric | Coverage | Threshold |',
              '|---|---|---|',
              `| Lines | ${pct(t.lines)} | 80% |`,
              `| Functions | ${pct(t.functions)} | -- |`,
              `| Branches | ${pct(t.branches)} | -- |`,
              `| Statements | ${pct(t.statements)} | -- |`,
            ].join('\n');
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
              const existing = comments.find(c => c.body?.includes(marker) && c.user?.type === 'Bot');
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (err) {
              core.warning(`Failed to post coverage comment (GitHub API error): ${err.message}. Coverage data is available in the uploaded artifact.`);
            }

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0, GPL-2.0

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    timeout-minutes: 12
    needs: [quality-fast, typecheck, test]
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'design-system/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_BUILD }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL_BUILD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN_BUILD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY_BUILD }}
          DEPLOY_SALT: ci-build-salt

      - name: Bundle size gate
        run: node scripts/check-bundle-size.mjs --max-client-kb=220

      - name: Per-route JS budget gate
        run: node scripts/check-route-js.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: next-build
          path: .next/
          retention-days: 1
          include-hidden-files: true

      - name: Attest build provenance
        if: github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: .next/

  performance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    timeout-minutes: 20
    concurrency:
      group: perf-${{ github.ref }}
      cancel-in-progress: true
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    needs: [build, detect-changes]
    env:
      LHCI_BUILD_CONTEXT__EXTERNAL_BUILD_URL: ${{ github.event.pull_request.html_url || github.event.head_commit.url }}
      LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-build
          path: .next/

      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright Chromium (for axe-core scan)
        run: pnpm playwright install --with-deps chromium

      - name: Start preview server
        run: pnpm start > /tmp/server-perf.log 2>&1 &
        env:
          DEPLOY_SALT: ci-build-salt

      - name: Wait for server
        run: |
          pnpm exec wait-on http://localhost:3000 --timeout 30000 || {
            echo "Server failed to start. Log output:"
            cat /tmp/server-perf.log
            exit 1
          }

      - name: Lighthouse CI (desktop)
        run: pnpm lhci

      - name: Lighthouse CI (mobile)
        run: pnpm lhci:mobile

      - name: axe-core a11y scan
        run: pnpm playwright test tests/a11y

  e2e-functional:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    needs: [build, detect-changes]
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, chromium-mobile, webkit-desktop, webkit-mobile, chromium-components]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}-
      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps ${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-build
          path: .next/
      - name: Start preview server
        run: pnpm start > /tmp/server-${{ matrix.project }}.log 2>&1 &
        env:
          DEPLOY_SALT: ci-build-salt
      - name: Wait for server
        run: |
          pnpm exec wait-on http://localhost:3000 --timeout 30000 || {
            echo "Server failed to start. Log output:"
            cat /tmp/server-${{ matrix.project }}.log
            exit 1
          }
      - name: Run functional e2e (tests/e2e specs)
        if: matrix.project != 'chromium-components'
        run: pnpm playwright test --project=${{ matrix.project }} tests/e2e/
      - name: Run functional e2e (co-located component specs)
        if: matrix.project == 'chromium-components'
        run: pnpm playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: test-results/

  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      ai: ${{ steps.check.outputs.ai }}
      app: ${{ steps.check.outputs.app }}
      ui: ${{ steps.check.outputs.ui }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect changed file categories
        id: check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: node scripts/detect-changes.mjs

  ai-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      always()
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      && needs.detect-changes.outputs.ai == 'true'
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
    needs: [detect-changes, quality-fast, typecheck, test, build, e2e-functional, performance, e2e-visual-chromium]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: AI eval suite
        run: pnpm ask:eval
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY_BUILD }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ask-eval-result
          path: ask-eval-result.json

  e2e-visual-chromium:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.ui == 'true'
    needs: [build, detect-changes]
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, chromium-mobile]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-
      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-build
          path: .next/
      - name: Start preview server
        run: pnpm start > /tmp/server-${{ matrix.project }}.log 2>&1 &
        env:
          DEPLOY_SALT: ci-build-salt
      - name: Wait for server
        run: |
          pnpm exec wait-on http://localhost:3000 --timeout 30000 || {
            echo "Server failed to start. Log output:"
            cat /tmp/server-${{ matrix.project }}.log
            exit 1
          }
      - if: inputs.update_visual_baselines != 'true'
        name: Run visual regression
        run: pnpm playwright test --project=${{ matrix.project }} tests/visual/visual.spec.ts
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          ARGOS_PARALLEL: true
          ARGOS_PARALLEL_NONCE: ${{ github.run_id }}-${{ github.run_attempt }}
          ARGOS_PARALLEL_TOTAL: ${{ strategy.job-total }}
      - if: inputs.update_visual_baselines == 'true'
        name: Regenerate visual baselines (workflow_dispatch only)
        run: pnpm playwright test --project=${{ matrix.project }} tests/visual/visual.spec.ts --update-snapshots=all
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          ARGOS_PARALLEL: true
          ARGOS_PARALLEL_NONCE: ${{ github.run_id }}-${{ github.run_attempt }}
          ARGOS_PARALLEL_TOTAL: ${{ strategy.job-total }}
      - if: inputs.update_visual_baselines == 'true'
        name: Upload regenerated visual baselines
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-baselines-${{ matrix.project }}
          path: tests/visual/visual.spec.ts-snapshots/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: visual-report-${{ matrix.project }}
          path: test-results/

  ci-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs:
      [
        detect-changes,
        quality-fast,
        typecheck,
        test,
        dependency-review,
        build,
        performance,
        e2e-functional,
        e2e-visual-chromium,
        ai-eval,
        gitleaks,
      ]
    steps:
      - name: Gate on upstream job results
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          node -e '
            const BAD_RESULTS = new Set(["failure", "cancelled"]);
            const needs = JSON.parse(process.env.NEEDS_JSON);
            const bad = Object.entries(needs).filter(([, n]) => BAD_RESULTS.has(n.result));
            for (const [job, n] of Object.entries(needs)) {
              console.log(`${job}: ${n.result}`);
            }
            if (bad.length > 0) {
              console.error(`ci-gate: blocking on ${bad.map(([job]) => job).join(", ")}`);
              process.exit(1);
            }
            console.log("ci-gate: all upstream jobs succeeded or were intentionally skipped");
          '

  semgrep:
    name: Semgrep (static analysis)
    runs-on: ubuntu-latest
    permissions:
      security-events: write   # required to upload SARIF to the code-scanning tab
      contents: read
    timeout-minutes: 10
    concurrency:
      group: semgrep-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install Semgrep (exact-pinned) and resolve its path
        run: |
          pip install semgrep==1.169.0
          SEMGREP_BIN=$(python -c "import os,sysconfig,site,shutil; c=[os.path.join(sysconfig.get_path('scripts'),'semgrep'),os.path.join(site.getuserbase(),'bin','semgrep')]; w=shutil.which('semgrep'); c=c+[w] if w else c; print(next((p for p in c if os.path.exists(p)),''))")
          test -n "$SEMGREP_BIN" || { echo '::error::semgrep console script not found after install'; exit 1; }
          echo "SEMGREP_BIN=$SEMGREP_BIN" >> "$GITHUB_ENV"
          "$SEMGREP_BIN" --version

      - name: Self-test - vendored rules fire on the fixture
        run: node scripts/check-semgrep-fixture.mjs

      - name: Run Semgrep (SARIF, report-only)
        continue-on-error: true
        run: node scripts/run-semgrep.mjs --sarif semgrep.sarif

      - name: Assert Semgrep produced a report
        run: |
          if [ ! -s semgrep.sarif ]; then
            echo '::error::Semgrep produced no SARIF (semgrep.sarif missing or empty); the real-tree scan did not run. This is an infra failure, not a findings result.'
            exit 1
          fi

      - name: Upload SARIF to code-scanning
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  gitleaks:
    name: Gitleaks (secret scan)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    concurrency:
      group: gitleaks-${{ github.ref }}
      cancel-in-progress: true
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0   # gitleaks scans history, not just the tip

      # The self-test below (check-gitleaks-fixture.mjs) imports smol-toml to parse .gitleaks.toml,
      # so this job needs node_modules. Scoped to the self-test's dependency, not the scan: gitleaks
      # scans git history, which node_modules (gitignored, untracked) does not touch.
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Verified by CHECKSUM, not by asking the binary what it is: a tampered binary can
      # print any version string it likes. The repo SHA-pins its Actions and exact-pins
      # semgrep; a curl'd tarball has to clear the same bar.
      - name: Install gitleaks (checksum-verified, exact-pinned)
        run: |
          set -euo pipefail   # explicit: the sha256sum -c below must abort the step, not just print
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL -o "$tarball" "$base/$tarball"
          curl -sSfL -o checksums.txt "$base/gitleaks_${GITLEAKS_VERSION}_checksums.txt"

          expected="$(awk -v f="$tarball" '$2 == f { print $1 }' checksums.txt)"
          if [ -z "$expected" ]; then
            echo "::error::no checksum for $tarball in the release checksums file. Refusing to install an unverified binary."
            exit 1
          fi
          echo "${expected}  ${tarball}" | sha256sum -c -

          tar -xzf "$tarball" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks
          rm -f gitleaks "$tarball" checksums.txt

          installed="$(gitleaks version)"
          if [ "$installed" != "$GITLEAKS_VERSION" ]; then
            echo "::error::gitleaks reports version '$installed', expected '$GITLEAKS_VERSION'."
            exit 1
          fi

      # Proves the scanner FIRES. A secret scan that finds nothing is indistinguishable
      # from a scanner that is silently broken, so this plants a real secret and fails
      # the job unless gitleaks detects it (and stays silent on the clean fixture).
      - name: Self-test - gitleaks fires on the fixture
        run: node scripts/check-gitleaks-fixture.mjs

      - name: Scan the repository and its history
        run: |
          set +e
          gitleaks git . --no-banner --redact --config .gitleaks.toml \
            --report-format sarif --report-path gitleaks.sarif
          status=$?
          set -e
          echo "GITLEAKS_STATUS=$status" >> "$GITHUB_ENV"
          if [ ! -s gitleaks.sarif ]; then
            echo '::error::gitleaks produced no SARIF; the scan did not run. This is an infra failure, not a clean result -- do not read it as "no secrets".'
            exit 1
          fi

      - name: Fail on findings
        run: |
          if [ "$GITLEAKS_STATUS" -eq 1 ]; then
            echo '::error::gitleaks found a secret. Values are redacted in the log; see the SARIF artifact. Rotate the credential -- it is already in git history.'
            exit 1
          fi
          if [ "$GITLEAKS_STATUS" -ne 0 ]; then
            echo "::error::gitleaks exited $GITLEAKS_STATUS (neither 0=clean nor 1=leaks). Treating an unknown exit code as clean would be a fail-open."
            exit 1
          fi
          echo 'gitleaks: clean'

      - name: Upload SARIF artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          retention-days: 7

