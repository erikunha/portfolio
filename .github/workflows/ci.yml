name: CI

# Required jobs for branch protection: quality-fast, typecheck, test, build, performance,
# e2e-functional, e2e-visual-chromium, ai-eval.
# Optional: add "CodeQL / Analyze (javascript-typescript)" to required checks in GitHub Settings to enforce it as a branch-protection gate (non-blocking by default).
#
# Path-filter strategy (detect-changes job):
#   ai=true   → app/api/ask/, lib/ask/, lib/ask-log.ts, lib/ip-hash.ts, lib/agent/,
#               lib/hiring-profile.ts, lib/stream-protocol.ts, lib/rate-limit.ts,
#               content/ask-eval-corpus.ts, content/perf-receipts.ts,
#               content/projects.ts, content/unknowns.ts, content/visa.ts,
#               scripts/ask-eval.ts
#               Gates: ai-eval (also gates on e2e-functional to avoid credit waste)
#   app=true  → app/, components/, design-system/, lib/, content/, public/, next.config.ts,
#               .github/workflows/ (workflow changes exercise CI itself),
#               lighthouserc.json, lighthouserc.mobile.json (LHCI threshold config),
#               scripts/check-bundle-size.mjs (perf budget threshold config),
#               playwright.config.ts (axe-core + E2E runner config),
#               package.json, pnpm-lock.yaml (dep changes must exercise perf + e2e gates)
#               Gates: performance, e2e-functional, e2e-visual-chromium
#   NOTE: package.json/pnpm-lock.yaml intentionally excluded from ai=true to avoid
#         burning AI Gateway credits on every lockfile churn. Trade-off: dep bumps to
#         AI-path packages (ai SDK, zod, @upstash/ratelimit) skip ai-eval. The
#         dependency-review gate (vuln/license scan) covers dep-change security.
# Skipped required checks are treated as satisfied by GitHub branch protection.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_visual_baselines:
        description: 'Regenerate Linux visual baselines and upload them as an artifact (download + commit to refresh baselines).'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Top-level cancel-in-progress is false: a push to main must not cancel the
# slower visual/e2e jobs still running from the previous commit.
# Fast jobs (quality-fast, typecheck, test, build) use per-job concurrency groups instead.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-fast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 8
    concurrency:
      group: quality-fast-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint branch name
        env:
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          echo "$BRANCH" | grep -qE '^(feat|fix|chore|docs|refactor|perf|test|build|ci|style|revert|dependabot|design-system)/.+$|^main$' \
            || (echo "Invalid branch name: $BRANCH" && exit 1)

      - name: Lint commit messages
        if: github.event_name == 'pull_request'
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

      - name: Biome check
        run: pnpm biome ci .

      - name: Validate content
        run: pnpm validate-content

      - name: Client-naming gate
        run: pnpm check:client-naming

      - name: Dependency-pinning gate
        run: pnpm check:dep-pinning

      - name: Harness size gate
        run: node scripts/check-harness-size.mjs

      - name: Component docs coverage
        run: pnpm check:component-docs

      - name: Doc-drift gate (ARCHITECTURE.md tree vs disk)
        run: pnpm check:doc-drift

      - name: Gate-health meta-gate (hook/script references resolve)
        run: pnpm check:gate-health

      - name: Contrast check
        run: pnpm lint:contrast

      - name: CSS tokens (no raw hex outside theme.css)
        run: pnpm lint:css-tokens

      - name: Package age check (supply-chain, info-only)
        # --warn-only: exits 0 always. Blocking a push for a freshly-released dep
        # is too aggressive for solo development. Warnings are visible in CI logs.
        run: node scripts/check-pkg-age.mjs --warn-only

      - name: PR comment merge gate
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm tsx scripts/check-pr-comments.ts ${{ github.event.pull_request.number }}

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    concurrency:
      group: typecheck-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache TypeScript build info
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: tsconfig.tsbuildinfo
          key: tsbuildinfo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig*.json') }}
          restore-keys: |
            tsbuildinfo-${{ runner.os }}-

      - name: Type check
        run: pnpm tsc --noEmit

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 8
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check if pnpm-lock.yaml changed
        id: lockfile-diff
        if: github.event_name == 'pull_request'
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          changed=true
          if git diff --quiet "$BASE...$HEAD" -- pnpm-lock.yaml 2>/dev/null; then
            changed=false
          fi
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"

      - name: Dependency vulnerability audit
        if: github.event_name != 'pull_request' || steps.lockfile-diff.outputs.changed == 'true'
        run: pnpm audit --audit-level=moderate

      - name: Unit tests
        run: pnpm test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Post coverage comment
        # Skip on fork PRs: GITHUB_TOKEN write permission is not granted to forks.
        # Mirrors the same guard used in the ai-eval job.
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('coverage/coverage-summary.json')) {
              core.warning('coverage/coverage-summary.json not found — skipping coverage comment. Did pnpm test:coverage complete?');
              return;
            }
            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            } catch (err) {
              core.warning(`Failed to parse coverage-summary.json: ${err.message}`);
              return;
            }
            const t = summary.total;
            if (!t || typeof t.lines?.pct !== 'number') {
              core.warning('coverage-summary.json is missing expected "total" fields. Skipping coverage comment.');
              return;
            }
            const pct = (n) => `${n.pct.toFixed(1)}%`;
            const marker = '<!-- coverage-bot -->';
            const body = [
              marker,
              '## Coverage',
              '| Metric | Coverage | Threshold |',
              '|---|---|---|',
              `| Lines | ${pct(t.lines)} | 80% |`,
              `| Functions | ${pct(t.functions)} | -- |`,
              `| Branches | ${pct(t.branches)} | -- |`,
              `| Statements | ${pct(t.statements)} | -- |`,
            ].join('\n');
            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              });
              const existing = comments.find(c => c.body?.includes(marker) && c.user?.type === 'Bot');
              if (existing) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body,
                });
              }
            } catch (err) {
              core.warning(`Failed to post coverage comment (GitHub API error): ${err.message}. Coverage data is available in the uploaded artifact.`);
            }

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0, GPL-2.0

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    timeout-minutes: 12
    needs: [quality-fast, typecheck, test]
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Cache Next.js build
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'components/**', 'lib/**', 'design-system/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_BUILD }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL_BUILD }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN_BUILD }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY_BUILD }}
          DEPLOY_SALT: ci-build-salt

      - name: Bundle size gate
        # Gates total client-chunk gzipped size. Per-route First Load JS is not
        # extractable from the Turbopack manifest; the 43KB island target is
        # tracked via `pnpm bundle:analyze`, not gated here.
        run: node scripts/check-bundle-size.mjs --max-client-kb=220

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: next-build
          path: .next/
          retention-days: 1
          include-hidden-files: true

      - name: Attest build provenance
        if: github.ref == 'refs/heads/main'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: .next/

  performance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # LHCI posts a "Lighthouse CI" commit status linking to the report it
      # uploads to temporary-public-storage. The basic-token path (not the LHCI
      # GitHub App) sets a commit status directly via the GitHub API, which needs
      # statuses: write. The budgets themselves are still enforced by the LHCI
      # assertions regardless of whether the status posts.
      statuses: write
    timeout-minutes: 20
    concurrency:
      group: perf-${{ github.ref }}
      cancel-in-progress: true
    # Skip on PRs that touch only scripts/docs/CI — LHCI only matters for app code changes.
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    needs: [build, detect-changes]
    env:
      LHCI_BUILD_CONTEXT__EXTERNAL_BUILD_URL: ${{ github.event.pull_request.html_url || github.event.head_commit.url }}
      # The built-in Actions token (no extra secret). LHCI uses LHCI_GITHUB_TOKEN
      # for the basic GitHub-status path; on fork PRs this token is read-only so
      # LHCI just warns and skips the status (it never fails the build on a
      # status-post error). For the richer per-category checks, swap to the LHCI
      # GitHub App's LHCI_GITHUB_APP_TOKEN secret instead.
      LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # On pull_request the runner checks out the ephemeral MERGE commit, so LHCI
      # would post its lhci/url/* statuses there — invisible on the PR. Pin the
      # build's current hash to the PR HEAD so the statuses (and their report
      # links) land on the PR commit; on push events this falls back to the
      # pushed SHA, which already matches the checked-out HEAD.
      LHCI_BUILD_CONTEXT__CURRENT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-build
          path: .next/

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-

      - name: Install Playwright Chromium (for axe-core scan)
        run: pnpm playwright install --with-deps chromium

      - name: Start preview server
        run: pnpm start > /tmp/server-perf.log 2>&1 &
        env:
          DEPLOY_SALT: ci-build-salt

      - name: Wait for server
        run: |
          pnpm exec wait-on http://localhost:3000 --timeout 30000 || {
            echo "Server failed to start. Log output:"
            cat /tmp/server-perf.log
            exit 1
          }

      - name: Lighthouse CI (desktop)
        run: pnpm lhci

      - name: Lighthouse CI (mobile)
        run: pnpm lhci:mobile

      - name: axe-core a11y scan
        run: pnpm playwright test tests/a11y

  e2e-functional:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.app == 'true'
    needs: [build, detect-changes]
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, chromium-mobile, webkit-desktop, webkit-mobile, chromium-components]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}-
      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps ${{ contains(matrix.project, 'webkit') && 'webkit' || 'chromium' }}
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-build
          path: .next/
      - name: Start preview server
        # WHY: matrix.project values are workflow-defined literals — never PR-controlled input.
        # Keeping them literal prevents shell-injection via ${{ matrix.project }} expansion.
        run: pnpm start > /tmp/server-${{ matrix.project }}.log 2>&1 &
        # DEPLOY_SALT is load-bearing: without it, lib/ip-hash.ts resolveSalt()
        # takes the production Upstash path (CI has no Redis creds) and throws,
        # so every validated /api/* request 500s via hashIp() in lib/server/route.ts.
        env:
          DEPLOY_SALT: ci-build-salt
      - name: Wait for server
        run: |
          pnpm exec wait-on http://localhost:3000 --timeout 30000 || {
            echo "Server failed to start. Log output:"
            cat /tmp/server-${{ matrix.project }}.log
            exit 1
          }
      - name: Run functional e2e (tests/e2e specs)
        if: matrix.project != 'chromium-components'
        # WHY: design-system-components.spec.ts is excluded via testIgnore in
        # playwright.config.ts (darwin-only visual baselines). Auto-discovery here
        # so new functional specs are picked up without a ci.yml edit.
        run: pnpm playwright test --project=${{ matrix.project }} tests/e2e/
      - name: Run functional e2e (co-located component specs)
        if: matrix.project == 'chromium-components'
        run: pnpm playwright test --project=${{ matrix.project }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-report-${{ matrix.project }}
          path: test-results/

  detect-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      ai: ${{ steps.check.outputs.ai }}
      app: ${{ steps.check.outputs.app }}
      ui: ${{ steps.check.outputs.ui }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect changed file categories
        id: check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "ai=true" >> "$GITHUB_OUTPUT"
            echo "app=true" >> "$GITHUB_OUTPUT"
            echo "ui=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ai_changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" -- \
            app/api/ask/ lib/ask/ lib/ask-log.ts lib/ip-hash.ts \
            lib/stream-protocol.ts lib/rate-limit.ts lib/agent/ lib/hiring-profile.ts \
            content/ask-eval-corpus.ts content/ask-eval-calibration.ts \
            content/perf-receipts.ts \
            content/projects.ts content/unknowns.ts content/visa.ts \
            scripts/ask-eval.ts '__tests__/ask-*')
          [[ -n "$ai_changed" ]] \
            && echo "ai=true" >> "$GITHUB_OUTPUT" \
            || echo "ai=false" >> "$GITHUB_OUTPUT"
          app_changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" -- \
            app/ components/ design-system/ lib/ content/ public/ next.config.ts \
            .github/workflows/ lighthouserc.json lighthouserc.mobile.json \
            scripts/check-bundle-size.mjs playwright.config.ts \
            package.json pnpm-lock.yaml)
          [[ -n "$app_changed" ]] \
            && echo "app=true" >> "$GITHUB_OUTPUT" \
            || echo "app=false" >> "$GITHUB_OUTPUT"
          # `ui` = files that can change RENDERED output; gates the visual / Argos job
          # only. Deliberately a SUBSET of `app`: it drops .github/workflows/,
          # lighthouserc*, and the bundle-size script, which belong in `app` (they
          # affect the build / e2e / perf gates) but cannot change a single rendered
          # pixel. Gating Argos on `app` made workflow-only PRs run the visual suite
          # and report spurious "N added" diffs against the baseline.
          # package.json is EXCLUDED from the plain path list: a script-only edit
          # (e.g. adding a `scripts` entry) cannot change a rendered pixel, yet would
          # trip the visual suite and report spurious Argos diffs. Most rendering-
          # affecting dependency changes go through pnpm-lock.yaml (kept below). But
          # two package.json regions can change emitted CSS/JS WITHOUT a lockfile diff:
          # `browserslist` (build target) and the `pnpm` block (`overrides` pins
          # transitive versions). Compare ONLY those fields SEMANTICALLY with jq (a
          # line-grep misses array-element edits like "chrome >= 93" -> ">= 95", whose
          # changed line does not contain the key name); re-arm `ui` only when they
          # differ. jq is preinstalled on GitHub hosted runners.
          # lib/eval/ (eval-harness code, never in the Next runtime) and
          # lib/__tests__/ (lib unit tests) are EXCLUDED via :(exclude) pathspecs:
          # neither can change a rendered pixel, but both live under lib/ and would
          # otherwise trip the visual suite + spurious Argos diffs (e.g. every
          # agent-eval sub-PR touches lib/eval/). lib runtime source stays gated.
          ui_changed=$(git diff --name-only "$BASE_SHA...$HEAD_SHA" -- \
            app/ components/ design-system/ lib/ content/ public/ \
            next.config.ts playwright.config.ts pnpm-lock.yaml \
            ':(exclude)lib/eval/**' ':(exclude)lib/__tests__/**')
          base_render=$(git show "$BASE_SHA:package.json" 2>/dev/null | jq -cS '{browserslist,pnpm}' 2>/dev/null || echo null)
          head_render=$(git show "$HEAD_SHA:package.json" 2>/dev/null | jq -cS '{browserslist,pnpm}' 2>/dev/null || echo null)
          ui_pkg_changed=""
          if [[ "$base_render" != "$head_render" ]]; then ui_pkg_changed=1; fi
          [[ -n "$ui_changed" || -n "$ui_pkg_changed" ]] \
            && echo "ui=true" >> "$GITHUB_OUTPUT" \
            || echo "ui=false" >> "$GITHUB_OUTPUT"

  ai-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Skip on fork PRs: repository secrets are not available to forks.
    # Skip when no AI-relevant files changed: GitHub treats skipped required checks as satisfied.
    if: |
      always()
      && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
      && needs.detect-changes.outputs.ai == 'true'
      && !contains(needs.*.result, 'failure')
      && !contains(needs.*.result, 'cancelled')
    # Run last: avoids burning AI Gateway credits when any required gate already fails.
    # always() lets GitHub evaluate the condition even when upstream jobs fail.
    # skipped (path-filtered) jobs are allowed — only failure/cancelled blocks.
    needs: [detect-changes, quality-fast, typecheck, test, build, e2e-functional, performance, e2e-visual-chromium]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: AI eval suite
        # No Upstash credentials: the route's rate-limit/budget/dedup paths are
        # all fail-open when Redis is unavailable. Metrics publish is best-effort.
        run: pnpm ask:eval
        env:
          AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY_BUILD }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: ask-eval-result
          path: ask-eval-result.json

  e2e-visual-chromium:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # REQUIRED: Linux Chromium rendering is deterministic — pixel-diff comparisons
    # are stable enough to gate on. Baselines are refreshed via workflow_dispatch.
    # Skip on PRs that touch only scripts/docs/CI: visual diffs only matter for code
    # that can change rendered output. Gated on `ui` (not `app`) so a workflow-only
    # PR does not run the visual suite and report spurious Argos "N added" diffs.
    if: github.event_name != 'pull_request' || needs.detect-changes.outputs.ui == 'true'
    needs: [build, detect-changes]
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, chromium-mobile]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-chromium-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-chromium-
      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: next-build
          path: .next/
      - name: Start preview server
        run: pnpm start > /tmp/server-${{ matrix.project }}.log 2>&1 &
        env:
          DEPLOY_SALT: ci-build-salt
      - name: Wait for server
        run: |
          pnpm exec wait-on http://localhost:3000 --timeout 30000 || {
            echo "Server failed to start. Log output:"
            cat /tmp/server-${{ matrix.project }}.log
            exit 1
          }
      - if: inputs.update_visual_baselines != 'true'
        name: Run visual regression
        run: pnpm playwright test --project=${{ matrix.project }} tests/visual/visual.spec.ts
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          # WHY: the two visual matrix jobs (chromium desktop = 5 shots; chromium-mobile
          # = 4, hero skipped) must MERGE into one Argos build. That needs all three vars:
          # ARGOS_PARALLEL=true activates parallel mode (without it the nonce/total are
          # ignored), the nonce groups the jobs, and the total tells Argos how many uploads
          # to wait for. Missing the enable flag let each job upload a SEPARATE build, so
          # whichever finished last set the commit status — mobile last produced the
          # spurious "4 added, 5 removed" (4-shot mobile set vs the 5-shot desktop baseline).
          ARGOS_PARALLEL: true
          ARGOS_PARALLEL_NONCE: ${{ github.run_id }}-${{ github.run_attempt }}
          ARGOS_PARALLEL_TOTAL: ${{ strategy.job-total }}
      - if: inputs.update_visual_baselines == 'true'
        name: Regenerate visual baselines (workflow_dispatch only)
        run: pnpm playwright test --project=${{ matrix.project }} tests/visual/visual.spec.ts --update-snapshots
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          ARGOS_PARALLEL: true
          ARGOS_PARALLEL_NONCE: ${{ github.run_id }}-${{ github.run_attempt }}
          ARGOS_PARALLEL_TOTAL: ${{ strategy.job-total }}
      - if: inputs.update_visual_baselines == 'true'
        name: Upload regenerated visual baselines
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-baselines-${{ matrix.project }}
          path: tests/visual/visual.spec.ts-snapshots/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: visual-report-${{ matrix.project }}
          path: test-results/

  semgrep:
    name: Semgrep (static analysis, non-blocking)
    runs-on: ubuntu-latest
    # Non-blocking: report-only until the false-positive-rate baseline is recorded
    # in DECISIONS.md (see ADR). Promotion to blocking is a separate change.
    continue-on-error: true
    permissions:
      security-events: write   # required to upload SARIF to the code-scanning tab
      contents: read
    timeout-minutes: 10
    concurrency:
      group: semgrep-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Semgrep (exact-pinned) and resolve its path
        # The wrapper invokes semgrep by name, but pip's console-script bin dir
        # is NOT reliably on the Node child process's PATH on hosted runners, and
        # `python -m semgrep` is not a supported entrypoint (semgrep ships a
        # console script only). Resolve the absolute console-script path from the
        # active interpreter and hand it to the wrapper via SEMGREP_BIN, so the
        # invocation is PATH-independent. The trailing --version fails the step
        # early with a clear signal if resolution is wrong.
        run: |
          # WHY setuptools<81: semgrep 1.97.0 imports pkg_resources at runtime,
          # which setuptools >=81 removed (ModuleNotFoundError: No module named
          # 'pkg_resources'). Pin setuptools <81 to keep pkg_resources available.
          # External-dep incompatibility, not our code; verified locally — 80.10.2
          # imports OK, 82.0.1 raises. See DECISIONS.md.
          pip install "setuptools<81" semgrep==1.97.0
          SEMGREP_BIN=$(python -c "import os,sysconfig,site,shutil; c=[os.path.join(sysconfig.get_path('scripts'),'semgrep'),os.path.join(site.getuserbase(),'bin','semgrep')]; w=shutil.which('semgrep'); c=c+[w] if w else c; print(next((p for p in c if os.path.exists(p)),''))")
          test -n "$SEMGREP_BIN" || { echo '::error::semgrep console script not found after install'; exit 1; }
          echo "SEMGREP_BIN=$SEMGREP_BIN" >> "$GITHUB_ENV"
          "$SEMGREP_BIN" --version

      - name: Run Semgrep (SARIF, report-only)
        # Omit --error so semgrep exits 0 on findings and the step writes SARIF
        # reliably (continue-on-error is a JOB-level soft-success flag; it does
        # NOT suppress step exit codes). When promoting to blocking: remove
        # continue-on-error AND add --error here together, so semgrep exits 1 on
        # findings and the step (and job) actually fail.
        run: node scripts/run-semgrep.mjs --sarif semgrep.sarif

      - name: Upload SARIF to code-scanning
        # Guard on the file existing, not just always(): if the scan step never
        # wrote SARIF (e.g. semgrep failed to run), uploading a missing path
        # fails with a confusing second error that masks the real cause. This
        # makes "no findings file" a clean skip and keeps the failure signal on
        # the scan step itself.
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: semgrep.sarif
          category: semgrep

